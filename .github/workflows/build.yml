name: Build AgentOS VM Image

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  UBUNTU_RELEASE: noble

jobs:
  build:
    name: Build ${{ matrix.edition }} Image
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      matrix:
        include:
          - edition: lite
            vm_name: agentos-lite
            flag: --lite
          - edition: server
            vm_name: agentos-server
            flag: --server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debootstrap \
            qemu-utils \
            parted \
            rsync \
            dosfstools \
            grub-pc-bin \
            squashfs-tools

      - name: Validate build config
        run: |
          chmod +x scripts/*.sh
          ./scripts/validate.sh

      - name: Build VM image
        run: |
          sudo ./scripts/build-vm.sh ${{ matrix.flag }}

      - name: Run smoke tests
        run: |
          sudo EDITION=${{ matrix.flag }} ./scripts/smoke-test.sh /tmp/agentos-build/rootfs

      - name: Upload QCOW2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.vm_name }}-qcow2
          path: /tmp/agentos-build/output/${{ matrix.vm_name }}.qcow2
          compression-level: 0  # Already compressed

      - name: Upload OVA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.vm_name }}-ova
          path: /tmp/agentos-build/output/${{ matrix.vm_name }}.ova
          compression-level: 0

      - name: Upload raw cloud image (Server only)
        if: matrix.edition == 'server'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.vm_name }}-raw
          path: /tmp/agentos-build/output/${{ matrix.vm_name }}.raw.gz
          compression-level: 0

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums-${{ matrix.edition }}
          path: /tmp/agentos-build/output/SHA256SUMS

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/agentos-lite-qcow2/agentos-lite.qcow2
            artifacts/agentos-lite-ova/agentos-lite.ova
            artifacts/agentos-server-qcow2/agentos-server.qcow2
            artifacts/agentos-server-ova/agentos-server.ova
            artifacts/agentos-server-raw/agentos-server.raw.gz
            artifacts/checksums-lite/SHA256SUMS
            artifacts/checksums-server/SHA256SUMS
          body: |
            ## AgentOS ${{ github.ref_name }}

            Ubuntu-based VM images with OpenClaw pre-configured for AI automation.
            Two editions are available: **Lite** (GNOME desktop) and **Server** (headless, cloud-ready).

            ---

            ### Lite Edition (Desktop)

            ```bash
            # VirtualBox
            VBoxManage import agentos-lite.ova
            VBoxManage startvm agentos-lite

            # QEMU/KVM
            qemu-system-x86_64 -hda agentos-lite.qcow2 -m 4096 -enable-kvm
            ```

            **Default credentials:** Username `user`, password `agentos` (change on first login)

            ---

            ### Server Edition (Headless / Cloud)

            ```bash
            # QEMU/KVM (with serial console)
            qemu-system-x86_64 -hda agentos-server.qcow2 -m 2048 -enable-kvm \
              -nographic -serial mon:stdio

            # Cloud import (AWS/GCP/Azure)
            # Use agentos-server.raw.gz — decompress then import as a custom image
            gunzip agentos-server.raw.gz
            ```

            Provision the agent non-interactively by placing `/etc/agentos/setup.conf`
            (see `setup.conf.example` in the release) or via cloud-init user-data.

            **Default credentials:** Username `admin`, SSH key auth only (provision via cloud-init)

            ---

            ### What's included
            - Ubuntu 24.04 LTS (Noble Numbat)
            - OpenClaw agent framework (latest)
            - Node.js 22 + Docker
            - AppArmor security profiles + audit logging
            - Credential vault + channel pairing
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
