<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="40%" stop-color="#1a1845"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#302b63" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0f0c29" stop-opacity="0"/>
    </radialGradient>
    <!-- Grid pattern for subtle tech feel -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Base gradient -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Subtle glow -->
  <rect width="1920" height="1080" fill="url(#glow)"/>

  <!-- Grid overlay -->
  <rect width="1920" height="1080" fill="url(#grid)"/>

  <!-- Decorative accent lines -->
  <line x1="0" y1="540" x2="400" y2="540" stroke="#7c6ff7" stroke-width="1" opacity="0.15"/>
  <line x1="1520" y1="540" x2="1920" y2="540" stroke="#7c6ff7" stroke-width="1" opacity="0.15"/>
  <circle cx="400" cy="540" r="3" fill="#7c6ff7" opacity="0.2"/>
  <circle cx="1520" cy="540" r="3" fill="#7c6ff7" opacity="0.2"/>

  <!-- Logo text -->
  <text x="960" y="500" text-anchor="middle" fill="#ffffff" font-family="sans-serif"
        font-size="64" font-weight="200" letter-spacing="12" opacity="0.12">AgentOS</text>
  <text x="960" y="550" text-anchor="middle" fill="#ffffff" font-family="sans-serif"
        font-size="18" font-weight="300" letter-spacing="4" opacity="0.08">YOUR AI, YOUR MACHINE</text>
</svg>
